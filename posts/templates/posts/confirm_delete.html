{% extends 'posts/base.html' %}
{% block title %}Eliminar post{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-8">
  <div class="bg-gray-800/40 border border-gray-700/50 rounded-2xl p-6">
    <h1 class="text-lg font-semibold text-gray-100 mb-2">¿Eliminar este post?</h1>
    <p class="text-sm text-gray-400 mb-4 leading-relaxed line-clamp-3">{{ post.text }}</p>
    <p class="text-xs text-gray-500 mb-6">Esta acción no se puede deshacer.</p>
    <div class="flex gap-3">
      <form method="post">
        {% csrf_token %}
        <button type="submit"
                class="bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-5 py-2 rounded-xl transition-colors">
          Sí, eliminar
        </button>
      </form>
      <a href="{% url 'dashboard' %}"
         class="border border-gray-700 hover:border-gray-500 text-gray-400 hover:text-gray-200 text-sm px-5 py-2 rounded-xl transition-colors">
        Cancelar
      </a>
    </div>
  </div>
</div>
{% endblock %}
